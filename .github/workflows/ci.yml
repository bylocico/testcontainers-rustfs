name: CI

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      rustfs_image:
        description: "RustFS image to test, for example rustfs/rustfs:latest"
        required: false
        default: "rustfs/rustfs:latest"

permissions:
  contents: read

jobs:
  test:
    name: Node ${{ matrix.node-version }}
    runs-on: ubuntu-latest
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        node-version:
          - 20.x
          - 22.x
          - 24.x
    env:
      RUSTFS_IMAGE: ${{ github.event.inputs.rustfs_image || 'rustfs/rustfs:1.0.0-beta.1' }}
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm

      - run: corepack enable

      - run: npm ci
      - run: npm run typecheck
      - run: npm run build
      - run: npm test
      - run: npm pack --dry-run
